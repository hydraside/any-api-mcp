server_name: demo-server
version: "1.0"

swagger:
  url: https://petstore.swagger.io/v2/swagger.json
  base_url: https://petstore.swagger.io/v2
  auth:
    type: api_key
    header: api_key
    token: your-api-key-here
  # Or OAuth2:
  # auth:
  #   type: oauth2
  #   token_url: https://oauth.example.com/token
  #   client_id: your-client-id
  #   client_secret: your-client-secret
  #   scopes: [read:pets, write:pets]

tools:
  - name: get_time
    description: Returns current server time via REST
    input_schema:
      type: object
      properties: {}
    handler:
      url: http://worldtimeapi.org/api/timezone/UTC
      method: GET

  - name: echo
    description: Echoes back the input message via REST with body
    input_schema:
      type: object
      properties:
        message:
          type: string
          description: Message to echo back
      required:
        - message
    handler:
      url: https://httpbin.org/post
      method: POST

  - name: get_ip
    description: Get public IP address via REST
    input_schema:
      type: object
      properties: {}
    handler:
      url: https://api.ipify.org?format=json
      method: GET

  - name: search_characters
    description: Search Rick and Morty characters via GraphQL
    input_schema:
      type: object
      properties:
        name:
          type: string
          description: Character name to search
    handler:
      type: graphql
      url: https://rickandmortyapi.com/graphql
      query: |
        query ($name: String!) {
          characters(filter: { name: $name }) {
            results {
              name
              status
              species
            }
          }
        }
      variables: {}

  - name: get_user
    description: Get user via JSONRPC
    input_schema:
      type: object
      properties:
        user_id:
          type: integer
          description: User ID
      required:
        - user_id
    handler:
      type: jsonrpc
      url: https://jsonplaceholder.typicode.com/posts
      method: getUser