server_name: Demo API
version: "1.0"
tools:
  - name: get_time
    description: Returns current UTC time
    input_schema:
      type: object
      properties: {}
    handler:
      url: http://worldtimeapi.org/api/timezone/UTC
      method: GET
  - name: get_my_ip
    description: Get your public IP address
    input_schema:
      type: object
      properties: {}
    handler:
      url: https://api.ipify.org?format=json
      method: GET
  - name: post_echo
    description: Echo any data back
    input_schema:
      type: object
      properties:
        message:
          type: string
          description: Message to echo
        count:
          type: integer
          description: Repeat count
      required:
        - message
    handler:
      url: https://httpbin.org/post
      method: POST