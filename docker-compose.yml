version: '3.8'

services:
  any-api-mcp:
    build: .
    container_name: any-api-mcp
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - CONFIG_PATH=/app/config.yaml
      - LOG_LEVEL=INFO
    restart: unless-stopped

